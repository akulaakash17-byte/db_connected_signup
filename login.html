<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080b12;
            --surface: #0e1320;
            --border: #1e2a40;
            --accent: #00f0ff;
            --accent2: #7b61ff;
            --text: #e2e8f0;
            --muted: #4a5568;
            --error: #ff4d6d;
            --success: #00f0a0;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(123,97,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(123,97,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(40px); }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
        }
        .orb1 { width: 350px; height: 350px; background: var(--accent); top: -80px; right: -80px; animation: float1 9s ease-in-out infinite; }
        .orb2 { width: 300px; height: 300px; background: var(--accent2); bottom: -60px; left: -60px; animation: float2 11s ease-in-out infinite; }

        @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-25px,20px)} }
        @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-25px)} }

        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 60px rgba(123,97,255,0.05), 0 20px 60px rgba(0,0,0,0.5);
            animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes slideUp {
            from { opacity:0; transform:translateY(30px); }
            to { opacity:1; transform:translateY(0); }
        }

        .card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(123,97,255,0.2), transparent 50%, rgba(0,240,255,0.2));
            z-index: -1;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }

        .subtitle {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 32px;
        }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--accent2);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-wrap { position: relative; }

        .input-wrap::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            transform: scaleX(0);
            transition: transform 0.3s;
            border-radius: 0 0 10px 10px;
        }

        .input-wrap:focus-within::after { transform: scaleX(1); }

        input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 16px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--accent2);
            box-shadow: 0 0 0 3px rgba(123,97,255,0.1);
            background: rgba(123,97,255,0.03);
        }

        input::placeholder { color: var(--muted); }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        .btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(123,97,255,0.3); }
        .btn:active { transform: translateY(0); }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            margin-bottom: 18px;
        }

        .alert.error { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3); color: var(--error); }
        .alert.success { background: rgba(0,240,160,0.1); border: 1px solid rgba(0,240,160,0.3); color: var(--success); }
        .alert.hidden { display: none; }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
        }

        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .divider span { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

        .footer-link {
            text-align: center;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--muted);
        }

        .footer-link a { color: var(--accent); text-decoration: none; font-weight: 700; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <div class="card">
        <div class="logo">
            <div class="logo-icon">🔐</div>
            <span class="logo-text">NEXUS</span>
        </div>

        <h1>Welcome Back</h1>
        <p class="subtitle">// authenticate to continue</p>

        <div id="alert-box" class="alert hidden"></div>

        <form action="/login.html" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrap">
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <input type="password" name="password" placeholder="your password" required>
                </div>
            </div>
            <button type="submit" class="btn">SIGN IN →</button>
        </form>

        <div class="divider"><span>new here?</span></div>

        <div class="footer-link">
            No account? <a href="/">Create one</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const alertBox = document.getElementById('alert-box');
        if (params.get('error')) {
            alertBox.textContent = decodeURIComponent(params.get('error'));
            alertBox.classList.remove('hidden');
            alertBox.classList.add('error');
        }
        if (params.get('success')) {
            alertBox.textContent = decodeURIComponent(params.get('success'));
            alertBox.classList.remove('hidden');
            alertBox.classList.add('success');
        }
    </script>
</body>
</html>
